<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Tumor Detection</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

/* BACKGROUND */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #33bbe0, #0c59be);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* subtle brain image */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
  opacity:0.06;
  pointer-events:none;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 600px;
  text-align: center;
}

/* HEADER */
.header { margin-bottom: 25px; }
.header h1 { font-size: 2.4rem; font-weight: 500; }
.header p { color: #cbd5e1; margin-top: 6px; }

/* ICON */
.brain-icon { font-size: 50px; margin-bottom: 10px; }

/* UPLOAD BOX */
.upload-box {
  border: 2px dashed #94a3b8;
  padding: 30px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}
.upload-box:hover { background: rgba(255,255,255,0.05); }
.upload-box p { margin-top: 10px; color: #cbd5e1; }
input { display:none; }

/* IMAGE */
img {
  max-width: 220px;
  margin-top: 15px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* BUTTONS */
.buttons { margin-top: 20px; }
button {
  padding: 10px 22px;
  border: none;
  border-radius: 6px;
  margin: 5px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}
.run { background: #22c55e; color: black; }
.run:hover { background: #16a34a; }
.clear { background: #ef4444; color: white; }
.clear:hover { background: #dc2626; }

/* RESULT */
.result { margin-top: 25px; font-size: 22px; font-weight: 500; }

/* CONFIDENCE BARS */
.confidence-bars { margin-top: 20px; text-align: left; }
.bar-container {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.bar-label {
  width: 120px;
  font-size: 14px;
}
.bar-track {
  flex: 1;
  height: 12px;
  background: rgba(255,255,255,0.2);
  border-radius: 6px;
  overflow: hidden;
  margin-right: 10px;
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  background: #22c55e;
  width: 0%;
  transition: width 1s ease;
}
.bar-fill.tumor { background: #ef4444; }
.bar-pct { width: 40px; text-align: right; font-size: 12px; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <!-- <div class="brain-icon">🧠</div> -->
    <h1>Brain Tumor Detection</h1>
    <p>Upload MRI scan to detect tumor presence</p>
  </div>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div style="font-size:40px;">🧠</div>
    <p>Click to upload MRI image</p>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <img id="preview">

  <div class="buttons">
    <button class="run" onclick="runModel()">Analyze</button>
    <button class="clear" onclick="clearData()">Clear</button>
  </div>

  <div class="result" id="result"></div>

  <div class="confidence-bars" id="confidenceBars"></div>

</div>

<script>
const CLASSES = ["Glioma", "Meningioma", "No Tumor", "Pituitary"];
let session;

/* LOAD MODEL */
async function loadModel() {
  session = await ort.InferenceSession.create('./brain_tumor_model.onnx');
}
loadModel();

/* IMAGE PREVIEW */
document.getElementById("fileInput").onchange = function(e) {
  const file = e.target.files[0];
  document.getElementById("preview").src = URL.createObjectURL(file);
};

/* PREPROCESS */
function preprocess(img) {
  const canvas = document.createElement("canvas");
  canvas.width = canvas.height = 256;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, 256, 256);
  const data = ctx.getImageData(0, 0, 256, 256).data;
  const input = new Float32Array(3*256*256);
  for (let i=0;i<256*256;i++){
    input[i] = data[i*4]/255;
    input[i+256*256] = data[i*4+1]/255;
    input[i+2*256*256] = data[i*4+2]/255;
  }
  return new ort.Tensor("float32", input, [1,3,256,256]);
}

/* SOFTMAX */
function softmax(arr){
  const m = Math.max(...arr);
  const e = arr.map(x => Math.exp(x-m));
  const sum = e.reduce((a,b)=>a+b,0);
  return e.map(x=>x/sum);
}

/* RUN MODEL */
async function runModel() {
  const img = document.getElementById("preview");
  if (!img.src) { alert("Upload image first"); return; }
  const image = new Image(); image.src = img.src; await image.decode();
  const tensor = preprocess(image);
  const output = await session.run({ input: tensor });
  const scores = softmax(Array.from(output.output.data));

  // Prediction
  const maxIndex = scores.indexOf(Math.max(...scores));
  const prediction = CLASSES[maxIndex];
  document.getElementById("result").innerHTML =
    prediction === "No Tumor" ? "🟢 No Tumor Detected" : `🔴 Tumor Detected (${prediction})`;

  // Confidence bars
  const barsContainer = document.getElementById("confidenceBars");
  barsContainer.innerHTML = "";
  CLASSES.forEach((cls,i)=>{
    const pct = (scores[i]*100).toFixed(1);
    const barFillClass = cls === "No Tumor" ? "" : "tumor";
    barsContainer.innerHTML += `
      <div class="bar-container">
        <div class="bar-label">${cls}</div>
        <div class="bar-track"><div class="bar-fill ${barFillClass}" style="width:0%"></div></div>
        <div class="bar-pct">${pct}%</div>
      </div>`;
  });

  // Animate bars
  requestAnimationFrame(()=>{
    document.querySelectorAll(".bar-fill").forEach((el,i)=>{
      el.style.width = (scores[i]*100) + "%";
    });
  });
}

/* CLEAR */
function clearData() {
  document.getElementById("preview").src = "";
  document.getElementById("result").innerHTML = "";
  document.getElementById("confidenceBars").innerHTML = "";
}
</script>

</body>
</html>
